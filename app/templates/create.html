{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                <h3 class="card-title fw-bold mb-0">新增讀書筆記</h3>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('books.create_book') }}" method="POST">
                    <div class="mb-4">
                        <label for="title" class="form-label fw-bold">書名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-lg bg-light" id="title" name="title" value="{{ title or '' }}" required placeholder="例如：原子習慣">
                    </div>
                    
                    <div class="mb-4">
                        <label for="rating" class="form-label fw-bold">評分 (1~5 星) <span class="text-danger">*</span></label>
                        <select class="form-select form-select-lg bg-light" id="rating" name="rating" required>
                            <option value="" disabled {% if not rating %}selected{% endif %}>請選擇給這本書的評價</option>
                            <option value="5" {% if rating|string == '5' %}selected{% endif %}>5 - 極度推薦 ★★★★★</option>
                            <option value="4" {% if rating|string == '4' %}selected{% endif %}>4 - 值得一讀 ★★★★☆</option>
                            <option value="3" {% if rating|string == '3' %}selected{% endif %}>3 - 普普通通 ★★★☆☆</option>
                            <option value="2" {% if rating|string == '2' %}selected{% endif %}>2 - 不如預期 ★★☆☆☆</option>
                            <option value="1" {% if rating|string == '1' %}selected{% endif %}>1 - 浪費時間 ★☆☆☆☆</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="review" class="form-label fw-bold">閱讀心得 <span class="text-danger">*</span></label>
                        <textarea class="form-control bg-light" id="review" name="review" rows="8" required placeholder="寫下你的重點筆記或讀後感想...">{{ review or '' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between pt-2">
                        <a href="{{ url_for('books.index') }}" class="btn btn-outline-secondary px-4">取消</a>
                        <button type="submit" class="btn btn-success px-5 fw-bold">儲存筆記</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
